<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IceBattery® | Temperature-Sensitive Logistics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <script>
      // Prevent "Cannot set property fetch of #<Window> which has only a getter"
      // This can happen if a polyfill or browser extension tries to overwrite fetch.
      try {
        if (window.fetch) {
          Object.defineProperty(window, 'fetch', {
            value: window.fetch,
            writable: true,
            configurable: true
          });
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
